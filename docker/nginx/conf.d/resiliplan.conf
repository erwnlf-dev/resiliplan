# ResiliPlan — HTTPS server
# Place this file at docker/nginx/conf.d/resiliplan.conf

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name resiliplan.kantor.local;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name resiliplan.kantor.local;

    # TLS (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/resiliplan.kantor.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resiliplan.kantor.local/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/resiliplan.kantor.local/chain.pem;

    # TLS config (modern)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Request size
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # API routes → backend
    location /api/ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://resiliplan_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # WebSocket (future: Yjs realtime)
    location /ws/ {
        proxy_pass http://resiliplan_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Exports (PDF, DOCX) — served by Nginx directly
    location /exports/ {
        alias /var/lib/resiliplan/exports/;
        expires 1h;
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";
    }

    # Web app (SPA) — fallback to index.html for client-side routing
    location / {
        proxy_pass http://resiliplan_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip pre-compressed assets
    gzip_static on;
}
